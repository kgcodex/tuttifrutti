repos:
  # 1. Standard Built-in Git Cleanups
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # 2. Local Hooks
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff linter
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff formatter
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy type checker
        entry: uv run mypy src
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest suite
        entry: uv run pytest
        language: system
        types: [python]
        pass_filenames: false
