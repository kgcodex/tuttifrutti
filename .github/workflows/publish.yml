name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build and Publish
    runs-on: ubuntu-latest

    environment: pypi

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Build Package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
